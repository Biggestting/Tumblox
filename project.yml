name: Tumblox
options:
  bundleIdPrefix: com.tumblox
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  defaultConfig: Debug

configs:
  Debug: debug
  Release: release

settings:
  base:
    PRODUCT_NAME: Tumblox
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "16.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: "NO"
    ENABLE_BITCODE: "NO"
    SWIFT_EMIT_LOC_STRINGS: "YES"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    INFOPLIST_FILE: SupportingFiles/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""  # Fill in your Apple Team ID

targets:
  Tumblox:
    type: application
    platform: iOS
    sources:
      - path: .
        excludes:
          - "*.yml"
          - "*.md"
          - ".git/**"
          - ".gitignore"
          - "SupportingFiles/Info.plist"
          - "SupportingFiles/Tumblox.storekit"
          - "DerivedData/**"
          - "build/**"
        createIntermediateGroups: true
    resources:
      - path: Assets.xcassets
      - path: SupportingFiles/Tumblox.storekit
        buildPhase: none        # Referenced in scheme only, not compiled
    entitlements:
      path: SupportingFiles/Tumblox.entitlements
    info:
      path: SupportingFiles/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tumblox.app
        INFOPLIST_FILE: SupportingFiles/Info.plist
      configs:
        Debug:
          DEBUG_INFORMATION_FORMAT: dwarf
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
          SWIFT_OPTIMIZATION_LEVEL: "-Owholemodule"
    dependencies:
      - sdk: GameKit.framework
      - sdk: StoreKit.framework

schemes:
  Tumblox:
    build:
      targets:
        Tumblox: all
    run:
      config: Debug
      storeKitConfiguration: SupportingFiles/Tumblox.storekit
      environmentVariables:
        OS_ACTIVITY_MODE: disable
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
